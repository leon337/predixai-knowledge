<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz - Aula 01 - Engenharia Reversa de Conhecimento</title>
  <link rel="stylesheet" href="../../styles.css" />
  <style>
    .quiz-card {
      background: #FFFFFF;
      border: 1px solid #CBD5E1;
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 16px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
    }

    .option {
      display: block;
      margin: 10px 0;
      padding: 12px;
      border: 1px solid #CBD5E1;
      border-radius: 12px;
      cursor: pointer;
    }

    .result {
      font-weight: bold;
      margin-top: 18px;
      font-size: 20px;
      color: #0F172A;
    }
  </style>
</head>

<body>
  <header>
    <div class="badge">Quiz</div>
    <h1>Aula 01 - Engenharia Reversa de Conhecimento</h1>
    <p>Teste de aprendizagem da Academia PredixAI</p>
  </header>

  <nav>
    <a href="../../index.html">Home</a>
    <a href="../../academy.html">Academy</a>
    <a href="index.html">Voltar para aula</a>
  </nav>

  <main>
    <form id="quiz"></form>
    <button class="button" onclick="checkQuiz()">Corrigir Quiz</button>
    <div class="result" id="result"></div>
  </main>

  <footer>
    PredixAI BR - Aprenda a pensar. Construa o futuro.
  </footer>

                        {

                        {

                    ],

    },
    {
        "number":  "2",

                        },
                        {
                            "letter":  "B",

                        {

                            "text":  "Entender o objetivo do projeto.\r"

    },
    {
        "number":  "3",
        "question":  "Na PredixAI, conhecimento importante deve ficar apenas no chat?",
        "options":  [
                        {
                            "letter":  "A",
                            "text":  "Sim.\r"
                        },
                        {
                            "letter":  "B",
                            "text":  "Apenas se for curto.\r"
                        },
                        {
                            "letter":  "C",
                            "text":  "Apenas se for ideia inicial.\r"
                        },
                        {
                            "letter":  "D",
                            "text":  "Não. Deve ser documentado e versionado.\r"
                        },
                        {

    {

        "options":  [

                        },
                        {
                            "letter":  "C",
                            "text":  "Como isso funciona e como posso aplicar?\r"

                        {

                            "text":  "Como faço sem estudar?\r"

                        {

    {

                        {

                            "text":  "Organizar as ideias.\r"
                        },
                        {
                            "letter":  "C",
                            "text":  "Querer entender tudo de uma vez.\r"
                        },
                        {
                            "letter":  "D",
                            "text":  "Criar checklist.\r"
                        },
                        {

                    ],

    {

        "options":  [

                        },
                        {

                        }

        "answer":  "B"
    },
    {
        "number":  "9",
        "question":  "Por que a engenharia reversa é importante para IA e programação?",
        "options":  [
                        {

    {
        "number":  "10",
        "question":  "Qual é a regra central da PredixAI sobre conhecimento?",
        "options":  [
                        {

                            "text":  "Consumir rápido e esquecer.\r"

                        {

                        {

                            "text":  "Estudar uma vez, documentar corretamente e reutilizar várias vezes.\r"
                        },
                        {
                            "letter":  "D",
                            "text":  "Nunca criar documentos.\r"
                        },
                        {
                            "letter":  "E",
                            "text":  "Usar apenas vídeos curtos."
                        }
                    ],
        "answer":  "C"
    }
];
    const form = document.getElementById("quiz");

    quizData.forEach((item, index) => {
      const card = document.createElement("section");
      card.className = "quiz-card";

      let html = "<h3>" + item.number + ". " + item.question + "</h3>";

      item.options.forEach(option => {
        html += "<label class='option'>";
        html += "<input type='radio' name='q" + index + "' value='" + option.letter + "'> ";
        html += option.letter + ") " + option.text;
        html += "</label>";
      });

      card.innerHTML = html;
      form.appendChild(card);
    });

    function checkQuiz() {
      let score = 0;

      quizData.forEach((item, index) => {
        const selected = document.querySelector("input[name='q" + index + "']:checked");

        if (selected && selected.value === item.answer) {
          score++;
        }
      });

      document.getElementById("result").innerText =
        "Resultado: " + score + " de " + quizData.length + " acertos.";
    }
  </script>
</body>
</html>
